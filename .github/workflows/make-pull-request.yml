name: Generate a Pull Request

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  make-pull-request:
    runs-on: ubuntu-latest
    steps:
      - run: echo "$GITHUB_RUN_ID" >run-id.txt

      - id: commit
        uses: amezin/create-commit-action@8b38a7bfa021058550473b6dd7aae378d809381e # v2.0.4
        with:
          message: Auto-generated commit
          files: run-id.txt

      - uses: amezin/create-or-update-git-ref-action@289103670796998ab617ee819d9dd967bbaedb0b # v2.0.3
        with:
          ref: refs/heads/auto-generated
          sha: ${{ steps.commit.outputs.sha }}
          force: true

      - uses: amezin/create-or-update-pull-request-action@0abe94508b600c8b5d8d4977ec0fd4e88abf7cb2 # v2.1.0
        with:
          title: Auto-generated Pull Request
          head: auto-generated
