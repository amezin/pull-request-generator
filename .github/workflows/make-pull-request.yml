name: Generate a Pull Request

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  make-pull-request:
    runs-on: ubuntu-latest
    steps:
      - run: echo "$GITHUB_RUN_ID" >run-id.txt

      - id: commit
        uses: amezin/create-commit-action@8b38a7bfa021058550473b6dd7aae378d809381e # v2.0.4
        with:
          message: Auto-generated commit
          files: run-id.txt

      - uses: amezin/create-or-update-pull-request-action@1a5b9c5b9e9680a9f8cb06aea728536cfbd5e621 # v2.2.0
        with:
          title: Auto-generated Pull Request
          head: auto-generated
          head_sha: ${{ steps.commit.outputs.sha }}
