name: Generate a Pull Request

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  make-pull-request:
    runs-on: ubuntu-latest
    steps:
      - run: echo "$GITHUB_RUN_ID" >run-id.txt

      - id: commit
        uses: amezin/create-commit-action@d2fecc2871c29cd4d0a07b98642f5d63aeef6430 # v2.0.3
        with:
          message: Auto-generated commit
          files: run-id.txt

      - uses: amezin/create-or-update-git-ref-action@9c82c89a00ab473475437f4b496db14be1768dc2 # v2.0.0
        with:
          ref: refs/heads/auto-generated
          sha: ${{ steps.commit.outputs.sha }}
          force: true

      - uses: amezin/create-or-update-pull-request-action@1964c1e0e949da6408b741ecb900168274f9085e # v2.0.0
        with:
          title: Auto-generated Pull Request
          head: auto-generated
